name: Generate

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Get OpenSCAD version
      id: openscad-version
      run: |
        git clone https://github.com/openscad/openscad.git
        cd openscad
        echo "version=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Cache OpenSCAD build
      uses: actions/cache@v3
      with:
        path: openscad/build
        key: ${{ runner.os }}-openscad-build-${{ env.version }}
        restore-keys: ${{ runner.os }}-openscad-build-${{ env.version }}

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: sudo apt-get update && sudo apt-get install -y cmake g++ libboost-all-dev libeigen3-dev libgmp-dev libglew-dev libopencsg-dev libdouble-conversion-dev libharfbuzz-dev libmpfr-dev libqt5opengl5-dev libqt5webkit5-dev libqt5xmlpatterns5-dev libqscintilla2-qt5-dev libqscintilla2-qt5-dev libqt5svg5-dev libzip-dev


    - name: Build OpenSCAD
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        cd openscad
        mkdir build
        cd build
        cmake ..
        make -j$(nproc)
        sudo make install

    - name: Generate STL and PNG
      run: |
        mkdir -p output
        mkdir -p output/example
        Xvfb :99 & export DISPLAY=:99
        #openscad --backend=manifold -o output/example/model.stl examples.2.scad
        openscad --backend=manifold --render -o output/example/model_top.png --imgsize=2048,2048 --projection=o --camera=0,0,100,0,0,0,1 --autocenter --viewall examples.2.scad
        openscad --backend=manifold --render -o output/example/model_iso.png --imgsize=2048,2048 --projection=o --camera=50,50,50,55,0,25,1 --autocenter --viewall examples.2.scad

    # - name: Zip output
    #   run: |
    #     for dir in output/*/; do
    #       zip -r "${dir%/}.zip" "$dir"
    #     done

    - name: Upload STL and PNG
      uses: actions/upload-artifact@v4
      with:
        name: Outputs
        path: output/*
