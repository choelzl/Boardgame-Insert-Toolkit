name: Generate

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Cache
      uses: actions/cache@v4.1.2
      with:
        path: output/
        key: ${{ runner.os }}-openscad-output-${{ hashFiles('**/*.scad') }}
        restore-keys: ${{ runner.os }}-openscad-output-${{ hashFiles('**/*.scad') }}

    - name: Install OpenSCAD
      run: sudo apt-get install -y openscad

    - name: Generate STL and PNG
      run: |
        mkdir -p output
        mkdir -p output/example
        Xvfb :99 & export DISPLAY=:99
        #openscad -o output/example/model.stl examples.2.scad
        openscad -o output/example/model_top.png --imgsize=2048,2048 --projection=o --camera=0,0,100,0,0,0,1 --autocenter --viewall examples.2.scad
        openscad -o output/example/model_iso.png --imgsize=2048,2048 --projection=o --camera=50,50,50,55,0,25,1 --autocenter --viewall examples.2.scad

    # - name: Zip output
    #   run: |
    #     for dir in output/*/; do
    #       zip -r "${dir%/}.zip" "$dir"
    #     done

    - name: Upload STL and PNG
      uses: actions/upload-artifact@v4
      with:
        name: Outputs
        path: output/*
